            align-items: center;

        .medal-gold::after,
        .medal-silver::after {

            left: -60%;
            width: 30%;
            height: 200%;
            background: linear-gradient(to right,

    <script>
        // Core State

        // Custom Modal Actions
        function showCustomAlert(title, text) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const actions = document.getElementById('modal-actions');
            actions.innerHTML = `

            `;
            modal.classList.remove('hidden');
        }

        function showCustomConfirm(title, text, onConfirm) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const actions = document.getElementById('modal-actions');
            actions.innerHTML = `
                <button onclick="closeCustomModal()" class="px-4 py-2 bg-subtle hover:bg-subtle/80 text-primary rounded-xl text-xs font-bold transition-all">Отмена</button>
                <button id="modal-action-confirm" class="px-4 py-2 bg-brandError hover:bg-red-600 text-white rounded-xl text-xs font-bold transition-all">Подтвердить</button>
            `;
            document.getElementById('modal-action-confirm').onclick = () => {
                closeCustomModal();
                onConfirm();
            };
            modal.classList.remove('hidden');
        }

        function closeCustomModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }

        // Web Audio Synthesizer Engine
        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.15); // C6
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'incorrect') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'laser') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                } else if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'victory') {
                    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                    notes.forEach((freq, idx) => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.connect(g);
                        g.connect(ctx.destination);
                        o.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.1);
                        g.gain.setValueAtTime(0.1, ctx.currentTime + idx * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + idx * 0.1 + 0.4);
                        o.start(ctx.currentTime + idx * 0.1);
                        o.stop(ctx.currentTime + idx * 0.1 + 0.4);
                    });
                }
            } catch (e) {
                console.warn("Audio Context blocked or unsupported by browser", e);
            }
        }

        // Interactive motherboard engine (Ticket 7)
        function selectBoardComponent(componentId) {
            const specCard = document.getElementById('board-spec-card');
            if (!specCard) return;

            const specs = {
                cpu: { title: "Разъем (Socket) процессора", sub: "Разъем Socket 754", desc: "Служит для установки центрального процессора AMD Sempron 2600+. Тактовая частота 1.6 ГГц, изготовлен по техпроцессу 90 нм. Напряжение питания ядра: 1.4 В, объем кэш-памяти L1 = 128 Кб, L2 = 128 Кб." },
                northbridge: { title: "Системный контроллер", sub: "«Северный мост»", desc: "Координирует высокоскоростной обмен данными между центральным процессором (CPU), оперативной памятью (ОЗУ) и внешним видеоадаптером." },
                southbridge: { title: "Функциональный контроллер", sub: "«Южный мост»", desc: "Управляет обменом данными с медленными периферийными интерфейсами, платами расширения PCI, SATA-накопителями и микросхемой BIOS." },
                ram: { title: "Разъемы ОЗУ", sub: "Слоты DDR DIMM", desc: "Разъемы для установки синхронной динамической памяти DDR400 (PC3200). Номинальное рабочее напряжение синхронных чипов составляет 2.5 В." },
                bios: { title: "Базовая система ввода-вывода", sub: "Микросхема BIOS", desc: "Хранит первичный программный код инициализации, тестирования оборудования (POST) и запуска ОС. Настройки CMOS питаются от резервной батарейки." }
            };

            const data = specs[componentId];
            if (data) {
                specCard.innerHTML = `
                    <div class="animate-fade-in">
                        <span class="text-[10px] font-bold text-gold uppercase tracking-wider">${data.sub}</span>
                        <h5 class="text-base font-bold text-primary mt-1">${data.title}</h5>
                        <p class="text-xs text-muted mt-2 leading-relaxed">${data.desc}</p>
                    </div>
                `;
                playSound('laser');
            }
        }

        // Interactive IDEF0 Functional diagram engine (Ticket 8)
        function selectIdef0Area(sideId) {
            const infoPanel = document.getElementById('idef0-info-panel');
            if (!infoPanel) return;

            const dataMap = {
                control: { title: "Управление (Control)", side: "Верхняя грань функционального блока", desc: "Регламентирующие правила, законы, ГОСТы, нормативные акты, стандарты компании и инструкции, определяющие рамки и условия выполнения бизнес-функции." },
                input: { title: "Вход (Input)", side: "Левая грань функционального блока", desc: "Сырье, исходные материалы или информационные данные, которые преобразуются функциональным блоком в выходной результат." },
                output: { title: "Выход (Output)", side: "Правая грань функционального блока", desc: "Материальный или информационный результат выполнения процесса, произведенный функциональным блоком." },
                mechanism: { title: "Механизм (Mechanism)", side: "Нижняя грань функционального блока", desc: "Ресурсы, непосредственно исполняющие данную функцию: рабочий персонал, станки, serverные комплексы, программные системы ИС." }
            };

            const info = dataMap[sideId];
            if (info) {
                infoPanel.innerHTML = `
                    <div class="animate-fade-in">
                        <span class="text-[10px] font-bold text-gold uppercase tracking-wider">${info.side}</span>
                        <h5 class="text-base font-bold text-primary mt-1">${info.title}</h5>
                        <p class="text-xs text-muted mt-2 leading-relaxed">${info.desc}</p>
                    </div>
                `;
                playSound('laser');
            }
        }

        const glossaryData = {
            "система": { title: "Система", definition: "Совокупность взаимосвязанных элементов, находящихся в определенных отношениях друг с другом и со средой." },
            "эмерджентность": { title: "Эмерджентность", definition: "Появление у сложной системы новых качественных свойств, которые отсутствуют у её отдельных составляющих элементов." },
            "информационная_система": { title: "Информационная система (ИС)", definition: "Организационно-техническое единство средств ВТ, ПО, баз данных, математических методов и персонала для сбора, накопления, хранения, обработки и выдачи данных." },
            "ескк": { title: "ЕСКК", definition: "Единая система классификации и кодирования информации. Представлена набором классификаторов (например, ОКВЭД), обеспечивающих сопоставимость показателей на ведомственных и межгосударственных уровнях." },
            "усд": { title: "Унифицированная система документации (УСД)", definition: "Комплекс взаимоувязанных документов, созданных по единым правилам и стандартам, освобождающих специалистов от рутинной работы за счет автоматизированной обработки." },
            "иерархическая_модель": { title: "Иерархическая модель", definition: "Структура данных в виде древовидного графа, где элементы жестко подчинены друг другу на различных уровнях (отношения вида 1:N)." },

                    const parsed = JSON.parse(saved);
                    gameState = Object.assign({
                        xp: 0,
                        streak: 0,
                        lastActivityDate: null,
                        lastStreakDate: null,
                        completedLevels: {}
                    }, parsed);
                    if (gameState.lastActivityDate) {
                        const lastDate = new Date(gameState.lastActivityDate);
                        const today = new Date();
                        // Compare calendar dates (not timestamps) to avoid rounding errors
                        const lastDateStr = lastDate.toDateString();
                        const todayStr = today.toDateString();
                        const yesterdayDate = new Date(today);
                        yesterdayDate.setDate(today.getDate() - 1);
                        const yesterdayStr = yesterdayDate.toDateString();
                        // Reset streak only if last activity was more than 1 day ago
                        if (lastDateStr !== todayStr && lastDateStr !== yesterdayStr) {
                            gameState.streak = 0;
                        }
                    }
                    if (!gameState.completedLevels) {
                        gameState.completedLevels = {};
                    } else if (Array.isArray(gameState.completedLevels)) {
                        let oldArray = gameState.completedLevels;
                        gameState.completedLevels = {};
                        oldArray.forEach(id => {
                            gameState.completedLevels[id] = 6;
                        });
                    }
                } catch (e) {
                    console.error("Error loading progress", e);
                }
            }
            updateGlobalUI();
        }

        let quizState = { levelId: null, questions: [], currentIndex: 0, correctCount: 0, timerVal: 30, timerId: null, answered: false };

        // ГАРАНТИРОВАННАЯ СЛУЧАЙНАЯ ВЫБОРКА 10 УНИКАЛЬНЫХ ВОПРОСОВ ИЗ ПОЛНОГО ПУЛА 30 ВОПРОСОВ
        function makeQuizReady(levelId) {
            const fullPool = generateProceduralQuestions(levelId); // Генерирует массив из 30 концептуальных вопросов

            // Алгоритм перемешивания Фишера — Йетса для всего исходного пула
            let poolCopy = [...fullPool];
            for (let i = poolCopy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [poolCopy[i], poolCopy[j]] = [poolCopy[j], poolCopy[i]];
            }

            // Срез ровно первых 10 записей — это гарантирует уникальность без повторений
            let uniqueTenSelection = poolCopy.slice(0, 10);

            // Маппинг и перемешивание вариантов ответов «на лету» внутри каждого выбранного вопроса
            quizState.questions = uniqueTenSelection.map(q => {
                let indexedOpts = q.options.map((text, idx) => ({ text, originalIdx: idx }));

                // Перемешивание вариантов ответов для вопроса
                for (let k = indexedOpts.length - 1; k > 0; k--) {
                    const m = Math.floor(Math.random() * (k + 1));
                    [indexedOpts[k], indexedOpts[m]] = [indexedOpts[m], indexedOpts[k]];
                }

                let shuffledOptions = indexedOpts.map(o => o.text);
                let correctShuffledIdx = indexedOpts.findIndex(o => o.originalIdx === q.correct);

                return {
                    level: q.level,
                    question: q.question,
                    options: shuffledOptions,
                    correct: correctShuffledIdx,
                    explanation: q.explanation
                };
            });

            quizState.levelId = levelId;
            quizState.currentIndex = 0;
            quizState.correctCount = 0;
            quizState.timerVal = 30;
            quizState.timerId = null;
            quizState.answered = false;

            activeView = 'quiz';
            renderActiveView();
            startQuizTimer();
        }

        function startQuizTimer() {
            if (quizState.timerId) clearInterval(quizState.timerId);
            quizState.timerVal = 30;
            quizState.answered = false;
            updateQuizTimerUI();
            quizState.timerId = setInterval(() => {
                quizState.timerVal--;
                updateQuizTimerUI();
                if (quizState.timerVal <= 0) {
                    clearInterval(quizState.timerId);
                    quizState.timerId = null;
                    submitQuizAnswer(-1);
                }
            }, 1000);
        }

        function updateQuizTimerUI() {
            const el = document.getElementById('quiz-timer-display');
            if (el) el.innerText = `${quizState.timerVal} сек`;
        }

        function renderQuizView(container) {
            const q = quizState.questions[quizState.currentIndex];
            if (!q) return;

            container.innerHTML = `

                            <button onclick="submitQuizAnswer(${idx})" class="w-full p-4 bg-card hover:bg-subtle/30 border border-subtle text-left rounded-xl text-primary font-medium text-xs md:text-sm transition-all focus:outline-none">
                                ${opt}

        }

        function submitQuizAnswer(selectedOptionIndex) {
            // Guard against double-submit (e.g. timer fires after button click)
            if (quizState.answered) return;
            quizState.answered = true;

            if (quizState.timerId) {
                clearInterval(quizState.timerId);
                quizState.timerId = null;
            }
            const q = quizState.questions[quizState.currentIndex];
            const feedbackBox = document.getElementById('quiz-feedback-box');
            const optionsContainer = document.getElementById('quiz-options-container');

            const isCorrect = (selectedOptionIndex === q.correct);
            if (isCorrect) {
                quizState.correctCount++;
                playSound('correct');
            } else {
                playSound('incorrect');
            }

            if (optionsContainer) {
                Array.from(optionsContainer.children).forEach((btn, idx) => {
                    btn.disabled = true;
                    if (idx === selectedOptionIndex) {
                        if (isCorrect) {
                            btn.classList.remove('border-subtle');
                            btn.classList.add('border-brandSuccess', 'ring-2', 'ring-brandSuccess/30');
                        } else {
                            btn.classList.remove('border-subtle');
                            btn.classList.add('border-brandError', 'ring-2', 'ring-brandError/30');
                        }
                    }
                    if (idx === q.correct) {
                        btn.classList.remove('border-subtle');
                        btn.classList.add('border-brandSuccess');
                    }
                });
            }

            if (feedbackBox) {
                feedbackBox.className = `p-5 rounded-2xl border mt-4 block ${isCorrect ? 'bg-brandSuccess/5 border-brandSuccess text-brandSuccess' : 'bg-brandError/5 border-brandError text-brandError'}`;
                feedbackBox.innerHTML = `
                    <p class="font-bold text-sm md:text-base">${isCorrect ? '✓ Абсолютно верно!' : (selectedOptionIndex === -1 ? '⏱ Время вышло!' : '✗ Неверный ответ.')}</p>
                    <p class="text-xs text-muted mt-2">${q.explanation}</p>
                    <button onclick="advanceQuiz()" class="mt-4 px-5 py-2.5 bg-primary text-page text-xs font-bold rounded-lg hover:bg-white transition-all">Продолжить</button>
                `;
            }
        }

        function advanceQuiz() {
            // Stop timer before advancing
            if (quizState.timerId) {
                clearInterval(quizState.timerId);
                quizState.timerId = null;
            }
            quizState.currentIndex++;
            if (quizState.currentIndex < quizState.questions.length) {
                renderQuizView(document.getElementById('main-viewport'));
                startQuizTimer();
            } else {
                renderQuizResult();
            }
        }

        function renderQuizResult() {
            // Ensure timer is fully stopped before showing results
            if (quizState.timerId) {
                clearInterval(quizState.timerId);
                quizState.timerId = null;
            }

            const viewport = document.getElementById('main-viewport');
            const isPassed = quizState.correctCount >= 6;

            if (isPassed) {
                const alreadyPassed = gameState.completedLevels[quizState.levelId] !== undefined && gameState.completedLevels[quizState.levelId] >= 6;
                if (!alreadyPassed) {
                    gameState.xp += 150;
                }

                const previousBest = gameState.completedLevels[quizState.levelId] || 0;
                if (quizState.correctCount > previousBest) {
                    gameState.completedLevels[quizState.levelId] = quizState.correctCount;
                }

                // Only increment streak once per calendar day
                const todayStr = new Date().toDateString();
                const lastStreakDate = gameState.lastStreakDate || null;
                if (lastStreakDate !== todayStr) {
                    gameState.streak++;
                    gameState.lastStreakDate = todayStr;
                }

                saveProgress();
                playSound('victory');

                viewport.innerHTML = `
                    <div class="max-w-xl mx-auto text-center space-y-6 py-12 animate-fade-in">
                        <div class="text-5xl">${quizState.correctCount === 10 ? '🥇' : '🥈'}</div>
                        <h2 class="text-2xl md:text-3xl font-black text-brandSuccess">Тест успешно сдан!</h2>
                        <p class="text-xs md:text-sm text-muted">Вы ответили правильно на ${quizState.correctCount} из 10 вопросов. Получено <span class="text-gold font-bold">+${alreadyPassed ? 0 : 150} XP</span>.</p>
                        <button onclick="showDashboard()" class="px-6 py-3 bg-brandActive hover:bg-indigo-600 text-white font-bold text-xs md:text-sm rounded-xl">В Личный Кабинет</button>
                    </div>
                `;
            } else {
                playSound('incorrect');
                viewport.innerHTML = `
                    <div class="max-w-xl mx-auto text-center space-y-6 py-12 animate-fade-in">
                        <div class="text-5xl">❌</div>
                        <h2 class="text-2xl md:text-3xl font-black text-brandError">Тест не сдан</h2>
                        <p class="text-xs md:text-sm text-muted">Правильных ответов: ${quizState.correctCount} из 10. Проходной балл — 6 из 10. Повторите теорию билета.</p>
                        <div class="flex justify-center space-x-4 mt-6 max-w-sm mx-auto">
                            <button onclick="selectLevel(${quizState.levelId})" class="px-6 py-3 bg-subtle text-primary font-bold text-xs md:text-sm rounded-xl">Повторить билет</button>
                            <button onclick="makeQuizReady(${quizState.levelId})" class="px-6 py-3 bg-brandActive text-white font-bold text-xs md:text-sm rounded-xl">Пройти заново</button>
                        </div>
                    </div>
                `;
            }
            renderLevelsSidebar();
        }

        let bossState = { bossHP: 2000, playerHP: 100, timer: 450, timerId: null, questions: [], currentIndex: 0, combatLogs: [] };

        // Proper Fisher-Yates shuffle (unbiased)
        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function activateBossView() {
            // Stop any existing quiz timer before entering boss mode
            if (quizState.timerId) {
                clearInterval(quizState.timerId);
                quizState.timerId = null;
            }

            // Gather questions from all 16 levels
            let allQuestionsPool = [];
            allQuestionsPool = allQuestionsPool.concat(masterQuestionsList);
            for (let i = 1; i <= 16; i++) {
                allQuestionsPool = allQuestionsPool.concat(generateProceduralQuestions(i));
            }

            bossState = {
                bossHP: 2000,
                playerHP: 100,
                timer: 450,
                timerId: null,
                questions: shuffleArray(allQuestionsPool),
                currentIndex: 0,
                combatLogs: ["⚔️ Экзаменационное сражение с Гранд-Экзаменатором началось!"]
            };
            activeView = 'boss';
            renderActiveView();
            startBossTimer();
            toggleMobileSidebar(false);
        }

        function startBossTimer() {
            if (bossState.timerId) clearInterval(bossState.timerId);
            bossState.timerId = setInterval(() => {
                bossState.timer--;
                const el = document.getElementById('boss-timer');
                if (el) el.innerText = `${bossState.timer} сек`;
                if (bossState.timer <= 0) processBossDefeat("Истекло отведенное экзаменационное время.");
            }, 1000);
        }

        function renderBossFightView(container) {
            container.innerHTML = `
                <div class="max-w-6xl mx-auto space-y-6 py-4 animate-fade-in">
                    <div class="flex justify-between items-center border-b border-subtle pb-4">
                        <h2 class="text-lg md:text-2xl font-black text-brandError tracking-tight flex items-center space-x-2">
                            <span>⚔️ ГРАНД-ЭКЗАМЕН</span>
                        </h2>
                        <button onclick="confirmExitBoss()" class="px-4 py-2 bg-subtle/30 hover:bg-brandError/20 text-muted hover:text-brandError border border-subtle rounded-xl text-xs font-bold transition-all">
                            Сдаться / Выйти
                        </button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-card p-5 rounded-2xl border border-subtle flex justify-between items-center">
                            <div>
                                <span class="text-[10px] text-muted font-bold uppercase">Студент</span>
                                <h4 class="font-black text-primary text-sm md:text-base mt-1">Очки Знаний (HP): <span id="p-hp" class="text-brandSuccess">100</span>/100</h4>
                            </div>
                            <div class="w-24 bg-page rounded-full h-3 border border-subtle overflow-hidden shrink-0">
                                <div id="p-hp-bar" class="bg-brandSuccess h-full w-full transition-all"></div>
                            </div>
                        </div>
                        <div class="bg-card p-5 rounded-2xl border border-brandError/30 flex justify-between items-center">
                            <div>
                                <span class="text-[10px] text-brandError font-bold uppercase">Гранд-Экзаменатор</span>
                                <h4 class="font-black text-brandError text-sm md:text-base mt-1">Защита Билета (HP): <span id="b-hp">2000</span>/2000</h4>
                            </div>
                            <div class="w-32 bg-page rounded-full h-3 border border-subtle overflow-hidden shrink-0">
                                <div id="b-hp-bar" class="bg-brandError h-full w-full transition-all"></div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-card px-6 py-3 rounded-xl border border-subtle text-center text-gold font-bold text-xs md:text-sm tracking-widest" id="boss-timer">450 сек</div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 space-y-4" id="boss-question-panel"></div>
                        <div class="bg-card p-5 rounded-2xl border border-subtle flex flex-col h-[340px] lg:h-[440px]">
                            <span class="text-xs font-bold text-muted uppercase tracking-wider mb-3 block">Журнал экзаменационного боя</span>
                            <div class="flex-1 overflow-y-auto text-[10px] md:text-xs code-font space-y-2 text-muted" id="boss-logs"></div>
                        </div>
                    </div>
                </div>
            `;
            loadBossQuestion();
            addLog("⚡ Гранд-Экзаменатор применил заклинание: Комплексная проверка знаний!");
        }

        function loadBossQuestion() {
            const q = bossState.questions[bossState.currentIndex];
            const qPanel = document.getElementById('boss-question-panel');
            if (!q || !qPanel) return;

            let indexedOpts = q.options.map((text, idx) => ({ text, originalIdx: idx }));
            indexedOpts.sort(() => Math.random() - 0.5);

            let shuffledOptions = indexedOpts.map(o => o.text);
            let correctShuffledIdx = indexedOpts.findIndex(o => o.originalIdx === q.correct);

            bossState.currentShuffledCorrect = correctShuffledIdx;

            qPanel.innerHTML = `
                <div class="bg-card p-6 rounded-2xl border border-subtle space-y-4">
                    <span class="text-[10px] text-brandActive font-mono font-bold">ВОПРОС СТАТУСА: БИЛЕТ ${q.level}</span>
                    <h3 class="text-base md:text-lg font-bold text-primary leading-relaxed">${q.question}</h3>
                </div>
                <div class="grid grid-cols-1 gap-3 mt-3" id="boss-answers-stack">
                    ${shuffledOptions.map((opt, idx) => `
                        <button onclick="submitBossAnswer(${idx})" class="w-full p-4 bg-card hover:bg-subtle/30 border border-subtle text-left text-xs md:text-sm text-primary rounded-xl transition-all focus:outline-none">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div id="boss-feedback" class="hidden p-4 rounded-xl border mt-3"></div>
            `;
        }

        function submitBossAnswer(idx) {
            const q = bossState.questions[bossState.currentIndex];
            const stack = document.getElementById('boss-answers-stack');
            const feedback = document.getElementById('boss-feedback');

            const isCorrect = (idx === bossState.currentShuffledCorrect);
            if (isCorrect) {
                const dmg = 100;
                bossState.bossHP = Math.max(0, bossState.bossHP - dmg);
                addLog(`✓ Верно! Ответ по билету ${q.level}. Урон Экзаменатору: -${dmg} HP!`);
                playSound('laser');
            } else {
                const pDmg = 20;
                bossState.playerHP = Math.max(0, bossState.playerHP - pDmg);
                addLog(`✗ Ошибка! Неверно по билету ${q.level}. Получен контрудар: -${pDmg} HP!`);
                playSound('hit');
            }

            if (stack) {
                Array.from(stack.children).forEach((btn, buttonIdx) => {
                    btn.disabled = true;
                    if (buttonIdx === idx) {
                        if (isCorrect) {
                            btn.classList.remove('border-subtle');
                            btn.classList.add('border-brandSuccess', 'ring-2', 'ring-brandSuccess/30');
                        } else {
                            btn.classList.remove('border-subtle');
                            btn.classList.add('border-brandError', 'ring-2', 'ring-brandError/30');
                        }
                    }
                    if (buttonIdx === bossState.currentShuffledCorrect) {
                        btn.classList.remove('border-subtle');
                        btn.classList.add('border-brandSuccess');
                    }
                });
            }

            document.getElementById('p-hp').innerText = bossState.playerHP;
            document.getElementById('b-hp').innerText = bossState.bossHP;
            document.getElementById('p-hp-bar').style.width = `${bossState.playerHP}%`;
            document.getElementById('b-hp-bar').style.width = `${(bossState.bossHP / 2000) * 100}%`;

            feedback.className = `p-4 rounded-xl border block ${isCorrect ? 'bg-brandSuccess/5 border-brandSuccess text-brandSuccess' : 'bg-brandError/5 border-brandError text-brandError'}`;
            feedback.innerHTML = `
                <p class="text-xs text-muted leading-relaxed">${q.explanation}</p>
                <button onclick="advanceBossFight()" class="mt-3 px-4 py-2 bg-primary text-page text-xs font-bold rounded-lg hover:bg-white transition-all">Продолжить бой</button>
            `;
        }

        function advanceBossFight() {
            if (bossState.bossHP <= 0) { processBossVictory(); return; }
            if (bossState.playerHP <= 0) { processBossDefeat("Очки здоровья вашего разума опустились до нуля."); return; }

            bossState.currentIndex++;
            if (bossState.currentIndex < bossState.questions.length) {
                loadBossQuestion();
            } else {
                addLog("🔄 Вопросы закончились! Гранд-Экзамен заходит на второй круг...");
                let allQuestionsPool = [];
                for (let i = 1; i <= 16; i++) {
                    allQuestionsPool = allQuestionsPool.concat(generateProceduralQuestions(i));
                }
                bossState.questions = shuffleArray(allQuestionsPool);
                bossState.currentIndex = 0;
                loadBossQuestion();
            }
        }

        function processBossVictory() {
            if (bossState.timerId) clearInterval(bossState.timerId);
            playSound('victory');
            const victoryXP = 2000;
            gameState.xp += victoryXP;
            saveProgress();
            document.getElementById('main-viewport').innerHTML = `
                <div class="text-center py-12 space-y-6 max-w-2xl mx-auto animate-fade-in">
                    <div class="text-5xl">🏆🦅</div>
                    <h2 class="text-3xl md:text-4xl font-black text-gold">БЛИСТАТЕЛЬНАЯ ПОБЕДА!</h2>
                    <p class="text-sm md:text-base text-muted leading-relaxed">
                        Гранд-Экзаменатор повержен! Вы безупречно продемонстрировали глубокие знания по всем 16 билетам архитектуры информационных систем Д. С. Васильченко. Начислено <span class="text-gold font-bold">+${victoryXP} XP</span>!
                    </p>
                    <button onclick="showDashboard()" class="px-8 py-3 bg-brandActive text-white font-bold rounded-xl shadow-lg hover:bg-indigo-600 transition-all">Вернуться в кабинет</button>
                </div>
            `;
        }

        function processBossDefeat(reason) {
            if (bossState.timerId) clearInterval(bossState.timerId);
            playSound('incorrect');
            document.getElementById('main-viewport').innerHTML = `
                <div class="text-center py-12 space-y-6 max-w-2xl mx-auto animate-fade-in">
                    <div class="text-6xl">🤕</div>
                    <h2 class="text-3xl font-black text-brandError">ПОРАЖЕНИЕ В БОЮ</h2>
                    <p class="text-sm text-muted">Причина поражения: ${reason}. Рекомендуется повторить слабые билеты и попробовать заново.</p>
                    <div class="flex justify-center space-x-4">
                        <button onclick="showDashboard()" class="px-6 py-3 bg-subtle text-primary font-bold rounded-xl">В Личный Кабинет</button>
                        <button onclick="activateBossView()" class="px-6 py-3 bg-brandActive text-white font-bold rounded-xl">Начать заново</button>
                    </div>
                </div>
            `;
        }

        function addLog(text) {
            bossState.combatLogs.unshift(text);
            const el = document.getElementById('boss-logs');
            if (el) el.innerHTML = bossState.combatLogs.map(l => `<div class="py-1 border-b border-subtle/20">${l}</div>`).join('');
        }

        function toggleGlossary(isOpen) {
            const sidebar = document.getElementById('glossary-sidebar');
            const backdrop = document.getElementById('glossary-backdrop');
            if (!sidebar) return;
            if (isOpen) {
                sidebar.classList.remove('translate-x-full');
                if (backdrop) backdrop.classList.remove('hidden');
            } else {
                sidebar.classList.add('translate-x-full');
                if (backdrop) backdrop.classList.add('hidden');
            }
        }

        function openTerm(termKey) {
            toggleGlossary(true);
            const term = glossaryData[termKey];
            if (term) {
                const searchInput = document.getElementById('glossary-search');
                searchInput.value = term.title;
                searchGlossary(term.title);
            }
        }

        function renderGlossaryList() {
            const container = document.getElementById('glossary-items-container');
            if (!container) return;
            container.innerHTML = '';
            Object.keys(glossaryData).sort().forEach(key => {
                const term = glossaryData[key];
                const div = document.createElement('div');
                div.className = "p-4 bg-page/50 rounded-xl border border-subtle transition-all hover:border-brandActive/50";
                div.innerHTML = `<h5 class="text-sm font-bold text-gold font-mono">${term.title}</h5><p class="text-xs text-muted leading-relaxed mt-1.5">${term.definition}</p>`;
                container.appendChild(div);
            });
        }

        function searchGlossary(query) {
            const normalized = query.toLowerCase().trim();
            const container = document.getElementById('glossary-items-container');
            if (!container) return;
            const items = container.children;
            const sortedKeys = Object.keys(glossaryData).sort();
            sortedKeys.forEach((key, index) => {
                const term = glossaryData[key];
                const matches = term.title.toLowerCase().includes(normalized) || term.definition.toLowerCase().includes(normalized);
                if (matches) items[index].classList.remove('hidden');
                else items[index].classList.add('hidden');
            });
        }

        function resetAllProgress() {
            gameState = { xp: 0, streak: 0, lastActivityDate: null, lastStreakDate: null, completedLevels: {} };
            saveProgress();
            showDashboard();
            showCustomAlert('Прогресс сброшен', 'Все ваши достижения и накопленные баллы были успешно удалены.');
        }

        window.selectBoardComponent = selectBoardComponent;
        window.selectIdef0Area = selectIdef0Area;
        window.openTerm = openTerm;
        window.toggleGlossary = toggleGlossary;

        window.addEventListener('load', () => {
            initLocalStorage();
            renderGlossaryList();
            showDashboard();
        });
    </script>
</body>

</html>
